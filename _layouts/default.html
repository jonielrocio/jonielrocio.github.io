<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  
  <link rel="stylesheet" href="/assets/css/style.css">
  
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
    header { border-bottom: 1px solid #eee; padding: 20px 0; text-align: center; }
    nav a { margin: 0 15px; text-decoration: none; color: #333; font-weight: bold; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="/">Home</a>
      <a href="/blog.html">Blog</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer style="text-align: center; padding: 40px 0; color: #888; border-top: 1px solid #eee; margin-top: 40px;">
    <p>&copy; {{ "now" | date: "%Y" }} Where the Trail Starts</p>
  </footer>

</body>
</html>
