<!DOCTYPE html>
<html>
<head>
    <title>{{ page.title }}</title>
   <style>
    /* This rule will win the fight */
    .card-image img {
        width: 100% !important;
        height: 250px !important;
        object-fit: cover !important;
        display: block !important;
    }

    .trip-grid {
        display: grid !important;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)) !important;
        gap: 30px !important;
    }
    
    /* Hide anything that might be coming from the old style.css */
    .old-class-names { display: none; }
</style>
</head>
<body>

    <header>
        <h1 style="color: #556b2f;">MeonFoot Redesign</h1>
        <hr>
    </header>

    <main class="container">
        {{ content }}
    </main>

    <footer style="margin-top: 50px; font-size: 0.8rem; color: #888;">
        © 2026 Joniel
    </footer>

</body>
</html>
