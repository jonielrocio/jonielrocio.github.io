<article class="post-container" style="max-width: 800px; margin: 0 auto; padding: 20px;">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p class="post-date" style="color: #666;">{{ page.date | date: "%B %d, %Y" }}</p>
  </header>

  <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

  <div class="post-content">
    {{ content }}
  </div>

  <footer style="margin-top: 50px;">
    <a href="blog.html" class="back-link" style="text-decoration: none; font-weight: bold;">← Back to Blog</a>
  </footer>
</article>
