---
layout: modern
title: Blog
---

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body class="{{ page.class }}"> <!-- This allows for your Knicks Orange specific styling -->

<main class="post-content-area">
    <article class="modern-post">
        <h1 class="post-title">{{ page.title }}</h1>
        <p class="post-date">Published on {{ page.date | date: "%B %e, %Y" }}</p>
            
        <div class="entry-content">
            {{ content }}
        </div>
    </article>
</main>

<!-- UNIVERSAL COMMENT SECTION -->
{% if page.comments %}
<section class="site-comments">
    <div class="comments-inner">
        {% include disqus_comments.html %}
    </div>
</section>
{% endif %}

<script>
    /* Your slider script stays here */
    let slideIndex = 1;
    setInterval(() => {
      const totalSlides = document.querySelectorAll('.slides input[type="radio"]').length;
      if (totalSlides > 0) {
        let radio = document.getElementById('i' + slideIndex);
        if (radio) { radio.checked = true; }
        slideIndex++;
        if (slideIndex > totalSlides) { slideIndex = 1; }
      }
    }, 5000);
</script>
  
</body>
</html>
