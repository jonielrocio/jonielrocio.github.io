layout: modern
title: Blog
---

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=devie-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>
<main style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
    <article class="modern-post">
        <h1 style="font-size: 2.8rem; color: #222; margin-bottom: 10px;">{{ page.title }}</h1>
        <p style="color: #666; margin-bottom: 30px;">Published on {{ page.date | date: "%B %e, %Y" }}</p>
            
          <div class="entry-content">
              {{ content }}
          </div>
        </article>
  </main>
  
  <script>
    let slideIndex = 1;
    
    setInterval(() => {
      // This finds ALL radio buttons inside your 'slides' container
      const totalSlides = document.querySelectorAll('.slides input[type="radio"]').length;
      
      if (totalSlides > 0) {
        let radio = document.getElementById('i' + slideIndex);
        if (radio) {
            radio.checked = true;
        }
        
        slideIndex++;
        
        // Instead of '4', it uses whatever the actual count is
        if (slideIndex > totalSlides) {
            slideIndex = 1;
        }
      }
    }, 5000);
  </script>
  
</body>
</html>
