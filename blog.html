                <meta charset="UTF-8">
                <title>Multi-Element Scrapbook</title>
                <style>
                    body { font-family: sans-serif; margin: 0; background: #f0f0f0; }
        
                    /* The Toolbar */
                    .controls {
                        background: #333;
                        color: white;
                        padding: 15px;
                        text-align: center;
                        position: sticky;
                        top: 0;
                        z-index: 100;
                    }        

                    /* The Canvas */
                    #canvas {
                        position: relative;
                        width: 100%;
                        height: 2000px; /* Large area to work in */
                        background: white;
                        background-image: radial-gradient(#e0e0e0 1px, transparent 1px);
                        background-size: 30px 30px;
                    }

                    /* Draggable Container */
                    .drag-item {
                       /* KEEP THESE (The Structure) */
                        position: absolute;
                        cursor: move;
                        z-index: 10;
                        min-width: 150px;
                    
                        /* CHANGE THESE (The Style) */
                        background: transparent;
                        border: none;
                        box-shadow: none;
                        padding: 5px;
                    }

                    .handle {
                        background: #444;
                        color: white;
                        padding: 5px;
                        cursor: move;
                        font-size: 10px;
                        display: flex;
                        justify-content: space-between;
                    }

                    .delete-btn {
                        cursor: pointer;
                        color: #ff4d4d;
                        font-weight: bold;
                    }

                    .content-area {
                        padding: 10px;
                        outline: none;
                    }

                    .image-wrapper {
                        resize: both;
                        overflow: hidden;
                        width: 200px;
                    }

                    img {
                        width: 100%;
                        height: 100%;
                        display: block;
                        object-fit: contain;
                    }
                </style>
            
                <div class="controls">
                    <button type="button" onclick="addText()" class="admin-only">Add Text Box</button>
                    <label for="multiImageInput" style="margin-left: 20px;" class="admin-only">Add Photo: </label>
                    <input type="file" id="multiImageInput" class="admin-only" accept="image/*" onchange="addPhoto(this)">
                    <button type="button" onclick="saveAll()" class="admin-only" style="margin-left: 20px; background: #28a745; color: white;">Save Layout</button>
                    <button id="logoutBtn" onclick="logout()" style="display:block; background: #dc3545; color: white;">Logout</button>
                </div>
            
                <div id="canvas">
                    </div>
            
                <script>
                    const canvas = document.getElementById('canvas');
            
                    // 1. ADD NEW TEXT BOX
                    function addText(content = "New Note...", x = 50, y = 50) {
                        const div = document.createElement('div');
                        div.className = 'drag-item';
                        div.style.left = x + 'px';
                        div.style.top = y + 'px';
                        
                        div.innerHTML = `
                            <div class="handle"><span>⠿ DRAG TEXT</span> <span class="delete-btn" onclick="this.parentElement.parentElement.remove()">X</span></div>
                            <div class="content-area" contenteditable="true">${content}</div>
                        `;
                        
                        canvas.appendChild(div);
                        makeDraggable(div);
                    }
            
                    // 2. ADD NEW PHOTO
                    function addPhoto(input) {
                        const file = input.files[0];
                        if (!file) return;
            
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            createPhotoElement(e.target.result);
                        };
                        reader.readAsDataURL(file);
                    }
            
                    function createPhotoElement(src, x = 100, y = 100, w = "200px") {
                        const div = document.createElement('div');
                        div.className = 'drag-item';
                        div.style.left = x + 'px';
                        div.style.top = y + 'px';
            
                        div.innerHTML = `
                            <div class="handle"><span>⠿ DRAG PHOTO</span> <span class="delete-btn" onclick="this.parentElement.parentElement.remove()">X</span></div>
                            <div class="image-wrapper" style="width: ${w}">
                                <img src="${src}">
                            </div>
                        `;
            
                        canvas.appendChild(div);
                        makeDraggable(div);
                    }
            
                    // 3. DRAG LOGIC (Works for any element passed to it)
                    function makeDraggable(el) {
                        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
                        const handle = el.querySelector('.handle');
            
                        handle.onmousedown = (e) => {
                            e.preventDefault();
                            pos3 = e.clientX;
                            pos4 = e.clientY;
                            document.onmouseup = () => {
                                document.onmouseup = null;
                                document.onmousemove = null;
                            };
                            document.onmousemove = (e) => {
                                e.preventDefault();
                                pos1 = pos3 - e.clientX;
                                pos2 = pos4 - e.clientY;
                                pos3 = e.clientX;
                                pos4 = e.clientY;
                                el.style.top = (el.offsetTop - pos2) + "px";
                                el.style.left = (el.offsetLeft - pos1) + "px";
                            };
                        };
                    }
            
                    // 4. SAVE & LOAD (Handles multiple items)
                    function saveAll() {
                        const items = [];
                        document.querySelectorAll('.drag-item').forEach(el => {
                            const isImg = el.querySelector('img');
                            items.push({
                                type: isImg ? 'image' : 'text',
                                content: isImg ? isImg.src : el.querySelector('.content-area').innerHTML,
                                x: el.offsetLeft,
                                y: el.offsetTop,
                                w: isImg ? el.querySelector('.image-wrapper').style.width : null
                            });
                        });
                        localStorage.setItem('scrapbookData', JSON.stringify(items));
                        alert("Layout Saved!");
                    }
            
                    window.onload = () => {
                        const data = JSON.parse(localStorage.getItem('scrapbookData'));
                        if (data) {
                            data.forEach(item => {
                                if (item.type === 'text') addText(item.content, item.x, item.y);
                                else createPhotoElement(item.content, item.x, item.y, item.w);
                            });
                        }
                    };
                </script>
            
                <button type="button" class="login-btn" onclick="checkLogin()">Login</button>
                    <div class="login-box">
                        <h3>Admin Login</h3>
                        <input type="text" id="username" placeholder="Username"><br>
                        <input type="password" id="password" placeholder="Password"><br>
                        <button type="button" onclick="console.log('HTML says: I am being clicked!'); checkLogin();">Login</button>
                        <button onclick="closeLogin()" style="background:#666;">Cancel</button>
                        <button id="logoutBtn" type="button" onclick="logout()" style="display: none; background: #dc3545; color: white; margin-left: 20px; padding: 5px 15px; border-radius: 4px; cursor: pointer;">
                            Logout
                        </button>
                        <p id="loginError" style="color:red; font-size:12px; display:none;">Incorrect details!</p>
                    </div>
                </div>
            
              <script>
                console.log("Diagnostic: Script is alive and ready!");
                  function checkLogin() {
                    document.querySelector('.login-box').style.background = 'yellow'; 
                    
                    console.log("Button was clicked!");
                    
                }
            
                function checkLogin() {
                    console.log("CLICK DETECTED!"); 
            
                    var u = document.getElementById('username').value;
                    var p = document.getElementById('password').value;
            
                    console.log("Attempting Login with: " + u);
            
                    if (u === 'username' && p === 'password') {
                        alert("Success! Welcome Boss.");
                        
                        // Show all Admin elements
                        var admins = document.getElementsByClassName('admin-only');
                        for (var i = 0; i < admins.length; i++) {
                            admins[i].style.setProperty('display', 'inline-block', 'important');
                        }
                        
                        document.getElementById('loginModal').style.display = 'none';
                    } else {
                        console.log("Login Failed: Incorrect credentials.");
                        document.getElementById('loginError').style.display = 'block';
                    }
                }
                function logout() {
                    // 1. Hide all Admin elements again
                    var admins = document.getElementsByClassName('admin-only');
                    for (var i = 0; i < admins.length; i++) {
                        admins[i].style.setProperty('display', 'none', 'important');
                    }
                
                    // 2. Hide the Red Logout button itself
                    document.getElementById('logoutBtn').style.display = 'none';
                
                    // 3. Show the Login Modal so you can log back in later
                    document.getElementById('loginModal').style.display = 'block';
                    
                    // 4. Clear the password field for security
                    document.getElementById('password').value = '';
                    
                    console.log("Admin has logged out.");
                }

             </script>
