                <meta charset="UTF-8">
                <title>Multi-Element Scrapbook</title>
                <style>
                    body { font-family: sans-serif; margin: 0; background: #f0f0f0; }
        
                    /* The Toolbar */
                    .controls {
                        background: #333;
                        color: white;
                        padding: 15px;
                        text-align: center;
                        position: sticky;
                        top: 0;
                        z-index: 100;
                    }        

                    /* The Canvas */
                    #canvas {
                        position: relative;
                        width: 100%;
                        height: 2000px; /* Large area to work in */
                        background: white;
                        background-image: radial-gradient(#e0e0e0 1px, transparent 1px);
                        background-size: 30px 30px;
                    }

                    /* Draggable Container */
                    .drag-item {
                       /* KEEP THESE (The Structure) */
                        position: absolute;
                        cursor: move;
                        z-index: 10;
                        min-width: 150px;
                    
                        /* CHANGE THESE (The Style) */
                        background: transparent;
                        border: none;
                        box-shadow: none;
                        padding: 5px;
                    }

                    .handle {
                        background: #444;
                        color: white;
                        padding: 5px;
                        cursor: move;
                        font-size: 10px;
                        display: flex;
                        justify-content: space-between;
                    }

                    .delete-btn {
                        cursor: pointer;
                        color: #ff4d4d;
                        font-weight: bold;
                    }

                    .content-area {
                        padding: 10px;
                        outline: none;
                    }

                    .image-wrapper {
                        resize: both;
                        overflow: hidden;
                        width: 200px;
                    }

                    img {
                        width: 100%;
                        height: 100%;
                        display: block;
                        object-fit: contain;
                    }
                </style>
            
               <div class="controls" style="position: fixed; bottom: 20px; right: 20px; z-index: 10000;">
                    <button id="openLoginBtn" type="button" class="login-btn" onclick="document.getElementById('loginModal').style.display='block'">
                        Admin Login
                    </button>
                    
                    <div id="loginModal" class="login-box" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border: 2px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                        <div id="login-form-content">
                            <h3>Admin Login</h3>
                            <input type="text" id="admin-user-input" placeholder="Username" style="margin-bottom:10px;"><br>
                            <input type="password" id="admin-pass-input" placeholder="Password" style="margin-bottom:10px;"><br>
                            <button type="button" onclick="checkLogin();" style="background: #28a745; color: white;">Login Now</button>
                            <button type="button" onclick="document.getElementById('loginModal').style.display='none'" style="background:#666; color: white;">Cancel</button>
                        </div>
                        <p id="loginError" style="color:red; font-size:12px; display:none;">Incorrect details!</p>
                    </div>
                </div>
                
                <script>
                    const canvas = document.getElementById('canvas');
                
                    // 1. COMBINED LOAD LOGIC
                    window.onload = function() {
                        // Check Login Status
                        if (localStorage.getItem('adminLoggedIn') === 'true') {
                            applyAdminUI();
                        }
                
                        // Load Scrapbook Data
                        const data = JSON.parse(localStorage.getItem('scrapbookData'));
                        if (data && canvas) {
                            data.forEach(item => {
                                if (item.type === 'text') addText(item.content, item.x, item.y);
                                else createPhotoElement(item.content, item.x, item.y, item.w);
                            });
                        }
                    };
                
                    // 2. LOGIN ENGINE
                    function checkLogin() {
                        var u = document.getElementById('admin-user-input').value;
                        var p = document.getElementById('admin-pass-input').value;
                
                        if (u === 'username' && p === 'password') {
                            localStorage.setItem('adminLoggedIn', 'true');
                            alert("Success! Welcome Boss.");
                            location.reload(); 
                        } else {
                            document.getElementById('loginError').style.display = 'block';
                            document.getElementById('loginModal').style.background = '#ffebee';
                        }
                    }
                
                    function applyAdminUI() {
                        const bar = document.getElementById('admin-floating-bar');
                        if (bar) bar.style.display = 'block';
                        
                        const openBtn = document.getElementById('openLoginBtn');
                        if (openBtn) openBtn.style.display = 'none';
                
                        const modal = document.getElementById('loginModal');
                        if (modal) modal.style.display = 'none';
                        
                        document.body.style.marginTop = "60px"; 
                    }
                
                    function logout() {
                        localStorage.removeItem('adminLoggedIn');
                        location.reload();
                    }
                
                    // 3. SCRAPBOOK CONSTRUCTION FUNCTIONS
                    function addText(content = "New Note...", x = 50, y = 50) {
                        if (!canvas) return;
                        const div = document.createElement('div');
                        div.className = 'drag-item';
                        div.style.left = x + 'px';
                        div.style.top = y + 'px';
                        div.innerHTML = `
                            <div class="handle" style="background:#444; color:white; padding:5px; cursor:move; font-size:10px;">
                                <span>⠿ DRAG</span> 
                                <span style="float:right; cursor:pointer;" onclick="this.parentElement.parentElement.remove()">X</span>
                            </div>
                            <div class="content-area" contenteditable="true" style="padding:10px; background:white; border:1px solid #ccc;">${content}</div>
                        `;
                        canvas.appendChild(div);
                        makeDraggable(div);
                    }
                
                    function createPhotoElement(src, x = 100, y = 100, w = "200px") {
                        if (!canvas) return;
                        const div = document.createElement('div');
                        div.className = 'drag-item';
                        div.style.left = x + 'px';
                        div.style.top = y + 'px';
                        div.innerHTML = `
                            <div class="handle" style="background:#444; color:white; padding:5px; cursor:move; font-size:10px;">
                                <span>⠿ PHOTO</span> 
                                <span style="float:right; cursor:pointer;" onclick="this.parentElement.parentElement.remove()">X</span>
                            </div>
                            <div class="image-wrapper" style="width: ${w}">
                                <img src="${src}" style="width:100%;">
                            </div>
                        `;
                        canvas.appendChild(div);
                        makeDraggable(div);
                    }
                
                    function makeDraggable(el) {
                        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
                        const handle = el.querySelector('.handle');
                        handle.onmousedown = (e) => {
                            e.preventDefault();
                            pos3 = e.clientX;
                            pos4 = e.clientY;
                            document.onmouseup = () => {
                                document.onmouseup = null;
                                document.onmousemove = null;
                            };
                            document.onmousemove = (e) => {
                                e.preventDefault();
                                pos1 = pos3 - e.clientX;
                                pos2 = pos4 - e.clientY;
                                pos3 = e.clientX;
                                pos4 = e.clientY;
                                el.style.top = (el.offsetTop - pos2) + "px";
                                el.style.left = (el.offsetLeft - pos1) + "px";
                            };
                        };
                    }
                </script>
                   
    </body>
