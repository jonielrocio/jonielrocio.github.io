            <p id="UC">UNDER CONSTRUCTION</p>
                <div id="textField" contenteditable="true" style="border: 1px solid #ccc; padding: 10px; min-height: 50px;">
                    Type something here...
                </div>

                <input type="file" id="imageInput" accept="image/*">

                <div id="display">
                <img id="myPhoto" src="" style="max-width: 100%; display: none; margin-top: 10px;">
                </div>

                <script>
                    const input = document.getElementById('imageInput');
                    const img = document.getElementById('myPhoto');
                    const textField = document.getElementById('textField');

                    // --- LOAD DATA ON START ---
                    window.onload = () => {
                    const savedText = localStorage.getItem('myText');
                    const savedImage = localStorage.getItem('myPhotoData');

                    if (savedText) textField.innerHTML = savedText;
                    if (savedImage) {
                    img.src = savedImage;
                    img.style.display = 'block';
                    }
                    };

                    // --- SAVE TEXT AS YOU TYPE ---
                    textField.oninput = () => {
                    localStorage.setItem('myText', textField.innerHTML);
                    };

                    // --- SAVE IMAGE ON UPLOAD ---
                    input.onchange = (e) => {
                    const file = input.files[0];
                    if (file) {
                    const reader = new FileReader();
            
                    reader.onloadend = () => {
                    const base64String = reader.result;
                    // Store the actual image data string
                    localStorage.setItem('myPhotoData', base64String);
                    // Update the UI
                    img.src = base64String;
                    img.style.display = 'block';
                    };

                    reader.readAsDataURL(file); 
                    }
                    };
                </script>

        </div>
