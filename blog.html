            <script>
            function openLogin() {
                const modal = document.getElementById('loginModal');
                if (modal) {
                    modal.style.display = 'block';
                } else {
                    console.error("Could not find the element with ID 'loginModal'");
                }
            }
            
            function closeLogin() {
                document.getElementById('loginModal').style.display = 'none';
            }
            
          function checkLogin() {
                const userIn = document.getElementById('admin-user-input').value;
                const passIn = document.getElementById('admin-pass-input').value;

                const hashedU = btoa(userIn);
                const hashedP = btoa(passIn);
            
                const targetU = "Sm9uaWVSb2Npbw==";
                const targetP = "MjkxOTE1M1BsZHQ=";
            
                if (hashedU === targetU && hashedP === targetP) {
                    localStorage.setItem("adminMode", "true");
                    location.reload();
                } else {
                    alert("Access Denied: The scrambled strings do not match.");
                }
            }
                
                    function logout() {
                    document.body.classList.remove('admin-mode');
                    alert("Logged Out Successfully");
                }
            </script>
            <p id="UC">UNDER CONSTRUCTION</p>
            <script>
                function checkLogin() {
                    // 1. Double check the elements exist
                    const userBox = document.getElementById('admin-user-input');
                    const passBox = document.getElementById('admin-pass-input');
                
                    if (!userBox || !passBox) {
                        console.error("The script can't find the input boxes! Check your HTML IDs.");
                        return;
                    }
                
                    // 2. Get values and trim spaces (spaces are common login killers!)
                    const typedUser = userBox.value.trim();
                    const typedPass = passBox.value.trim();
                
                    // 3. Compare with your secret scrambled keys
                    const secretUser = "Sm9uaWVSb2Npbw=="; // username
                    const secretPass = "MjkxOTE1M1BsZHQ="; // password
                
                    if (btoa(typedUser) === secretUser && btoa(typedPass) === secretPass) {
                        localStorage.setItem("adminMode", "true");
                        alert("Success! Entering Admin Mode...");
                        location.reload();
                    } else {
                        alert("Access Denied. Check your spelling!");
                    }
                }
                let inputBuffer = "";
                window.addEventListener('keydown', (e) => {
                    inputBuffer += e.key.toLowerCase();
                    if (inputBuffer.includes("boss")) {
                        document.getElementById('loginModal').style.display = 'block';
                        inputBuffer = ""; 
                    }
                    if (inputBuffer.length > 10) inputBuffer = inputBuffer.substring(1);
                });
            </script>
            <script>
                async function loadPosts() {
                  const feed = document.getElementById('blog-feed');
                  try {
                    // 1. Fetching the data from your GitHub folder
                    const response = await fetch('https://api.github.com/repos/jonielrocio/jonielrocio.github.io/contents/_posts');
                    const files = await response.json();
                    feed.innerHTML = ''; 
                
                    for (let file of files) {
                      // 2. Getting the actual content of each post
                      const postDataResponse = await fetch(file.download_url);
                      const text = await postDataResponse.text();
                      
                      // 3. Extracting the Title and Image link from your Markdown
                      const title = text.split('title: ')[1]?.split('\n')[0].replace(/"/g, '') || "New Post";
                      const image = text.split('image: ')[1]?.split('\n')[0] || "https://via.placeholder.com/300x200";
                
                      // 4. Building the "Card" (This is where the resizing happens!)
                      const card = document.createElement('div');
                      card.className = 'blog-card';
                      
                      card.innerHTML = `
                        <img src="${image}" class="card-photo"> 
                        <div class="blog-card-content">
                            <h3>${title}</h3>
                            <a href="${file.html_url}" class="read-more">Read More</a>
                        </div>
                      `;
                      
                      // 5. Putting the card into your #blog-feed container
                      feed.appendChild(card);
                    }
                  } catch (e) {
                    console.error("Error loading posts:", e);
                    feed.innerHTML = "<p>No posts found yet. Check your repository settings!</p>";
                  }
                }
                
                // 6. Run the function
                loadPosts();
            </script>
