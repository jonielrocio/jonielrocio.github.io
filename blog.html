                <meta charset="UTF-8">
                <title>Multi-Element Scrapbook</title>
                <style>
                    body { font-family: sans-serif; margin: 0; background: #f0f0f0; }
        
                    /* The Toolbar */
                    .controls {
                        background: #333;
                        color: white;
                        padding: 15px;
                        text-align: center;
                        position: sticky;
                        top: 0;
                        z-index: 100;
                    }        

                    /* The Canvas */
                    #canvas {
                        position: relative;
                        width: 100%;
                        height: 2000px; /* Large area to work in */
                        background: white;
                        background-image: radial-gradient(#e0e0e0 1px, transparent 1px);
                        background-size: 30px 30px;
                    }

                    /* Draggable Container */
                    .drag-item {
                        position: absolute;
                        z-index: 10;
                        background: white;
                        border: 1px solid #ccc;
                        box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
                        min-width: 150px;
                    }

                    .handle {
                        background: #444;
                        color: white;
                        padding: 5px;
                        cursor: move;
                        font-size: 10px;
                        display: flex;
                        justify-content: space-between;
                    }

                    .delete-btn {
                        cursor: pointer;
                        color: #ff4d4d;
                        font-weight: bold;
                    }

                    .content-area {
                        padding: 10px;
                        outline: none;
                    }

                    .image-wrapper {
                        resize: both;
                        overflow: hidden;
                        width: 200px;
                    }

                    img {
                        width: 100%;
                        height: 100%;
                        display: block;
                        object-fit: contain;
                    }
                </style>
            </head>
            <body>
            
                <div class="controls">
                    <button onclick="addText()">+ Add Text Box</button>
                    <label style="margin-left: 20px;">Add Photo: </label>
                    <input type="file" id="multiImageInput" accept="image/*" onchange="addPhoto(this)">
                    <button onclick="saveAll()" style="margin-left: 20px; background: #28a745; color: white;">Save Layout</button>
                </div>
            
                <div id="canvas">
                    </div>
            
                <script>
                    const canvas = document.getElementById('canvas');
            
                    // 1. ADD NEW TEXT BOX
                    function addText(content = "New Note...", x = 50, y = 50) {
                        const div = document.createElement('div');
                        div.className = 'drag-item';
                        div.style.left = x + 'px';
                        div.style.top = y + 'px';
                        
                        div.innerHTML = `
                            <div class="handle"><span>⠿ DRAG TEXT</span> <span class="delete-btn" onclick="this.parentElement.parentElement.remove()">X</span></div>
                            <div class="content-area" contenteditable="true">${content}</div>
                        `;
                        
                        canvas.appendChild(div);
                        makeDraggable(div);
                    }
            
                    // 2. ADD NEW PHOTO
                    function addPhoto(input) {
                        const file = input.files[0];
                        if (!file) return;
            
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            createPhotoElement(e.target.result);
                        };
                        reader.readAsDataURL(file);
                    }
            
                    function createPhotoElement(src, x = 100, y = 100, w = "200px") {
                        const div = document.createElement('div');
                        div.className = 'drag-item';
                        div.style.left = x + 'px';
                        div.style.top = y + 'px';
            
                        div.innerHTML = `
                            <div class="handle"><span>⠿ DRAG PHOTO</span> <span class="delete-btn" onclick="this.parentElement.parentElement.remove()">X</span></div>
                            <div class="image-wrapper" style="width: ${w}">
                                <img src="${src}">
                            </div>
                        `;
            
                        canvas.appendChild(div);
                        makeDraggable(div);
                    }
            
                    // 3. DRAG LOGIC (Works for any element passed to it)
                    function makeDraggable(el) {
                        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
                        const handle = el.querySelector('.handle');
            
                        handle.onmousedown = (e) => {
                            e.preventDefault();
                            pos3 = e.clientX;
                            pos4 = e.clientY;
                            document.onmouseup = () => {
                                document.onmouseup = null;
                                document.onmousemove = null;
                            };
                            document.onmousemove = (e) => {
                                e.preventDefault();
                                pos1 = pos3 - e.clientX;
                                pos2 = pos4 - e.clientY;
                                pos3 = e.clientX;
                                pos4 = e.clientY;
                                el.style.top = (el.offsetTop - pos2) + "px";
                                el.style.left = (el.offsetLeft - pos1) + "px";
                            };
                        };
                    }
            
                    // 4. SAVE & LOAD (Handles multiple items)
                    function saveAll() {
                        const items = [];
                        document.querySelectorAll('.drag-item').forEach(el => {
                            const isImg = el.querySelector('img');
                            items.push({
                                type: isImg ? 'image' : 'text',
                                content: isImg ? isImg.src : el.querySelector('.content-area').innerHTML,
                                x: el.offsetLeft,
                                y: el.offsetTop,
                                w: isImg ? el.querySelector('.image-wrapper').style.width : null
                            });
                        });
                        localStorage.setItem('scrapbookData', JSON.stringify(items));
                        alert("Layout Saved!");
                    }
            
                    window.onload = () => {
                        const data = JSON.parse(localStorage.getItem('scrapbookData'));
                        if (data) {
                            data.forEach(item => {
                                if (item.type === 'text') addText(item.content, item.x, item.y);
                                else createPhotoElement(item.content, item.x, item.y, item.w);
                            });
                        }
                    };
                </script>
            </body>
