            <p id="UC">UNDER CONSTRUCTION</p>
                <meta charset="UTF-8">
                <title>Multi-Element Scrapbook</title>
                <style>
                    body { font-family: sans-serif; margin: 0; background: #f0f0f0; }
        
                    /* The Toolbar */
                    .controls {
                        background: #333;
                        color: white;
                        padding: 15px;
                        text-align: center;
                        position: sticky;
                        top: 0;
                        z-index: 100;
                    }        

                    /* The Canvas */
                    #canvas {
                        position: relative;
                        width: 100%;
                        height: 2000px; /* Large area to work in */
                        background: white;
                        background-image: radial-gradient(#e0e0e0 1px, transparent 1px);
                        background-size: 30px 30px;
                    }

                    /* Draggable Container */
                    .drag-item {
                       /* KEEP THESE (The Structure) */
                        position: absolute;
                        cursor: move;
                        z-index: 10;
                        min-width: 150px;
                    
                        /* CHANGE THESE (The Style) */
                        background: transparent;
                        border: none;
                        box-shadow: none;
                        padding: 5px;
                    }

                    .handle {
                        background: #444;
                        color: white;
                        padding: 5px;
                        cursor: move;
                        font-size: 10px;
                        display: flex;
                        justify-content: space-between;
                    }

                    .delete-btn {
                        cursor: pointer;
                        color: #ff4d4d;
                        font-weight: bold;
                    }

                    .content-area {
                        padding: 10px;
                        outline: none;
                    }

                    .image-wrapper {
                        resize: both;
                        overflow: hidden;
                        width: 200px;
                    }

                    img {
                        width: 100%;
                        height: 100%;
                        display: block;
                        object-fit: contain;
                    }
                </style>
            
                <div class="controls">
                    <button id="openLoginBtn" type="button" class="login-btn" onclick="document.getElementById('loginModal').style.display='block'">
                        Admin Login
                    </button>
                    
                    <div id="loginModal" class="login-box" style="display: none;">
                        <div id="login-form-content">
                            <h3>Admin Login</h3>
                            <input type="text" id="username" placeholder="Username"><br>
                            <input type="password" id="password" placeholder="Password"><br>
                            <button type="button" onclick="checkLogin();">Login Now</button>
                            <button type="button" onclick="document.getElementById('loginModal').style.display='none'" style="background:#666;">Cancel</button>
                        </div>
                    
                        <div id="admin-header-tools" style="display: none;">
                            <span style="font-weight: bold; margin-right: 10px;">👤 JonieRocio</span>
                            
                            <button id="add-text-action" class="admin-only" style="display: none;" onclick="addText()">Add Text</button>
                            <button id="add-photo-action" class="admin-only" style="display: none;" onclick="addPhoto()">Add Photo</button>
                            
                            <button id="logoutBtn" type="button" onclick="logout()" style="background: #dc3545; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer;">
                                Logout
                            </button>
                        </div>
                    
                        <p id="loginError" style="color:red; font-size:12px; display:none;">Incorrect details!</p>
                    </div>
                </div>
            
                <script>
                    const canvas = document.getElementById('canvas');
            
                    // 1. ADD NEW TEXT BOX
                    function addText(content = "New Note...", x = 50, y = 50) {
                        const div = document.createElement('div');
                        div.className = 'drag-item';
                        div.style.left = x + 'px';
                        div.style.top = y + 'px';
                        
                        div.innerHTML = `
                            <div class="handle"><span>⠿ DRAG TEXT</span> <span class="delete-btn" onclick="this.parentElement.parentElement.remove()">X</span></div>
                            <div class="content-area" contenteditable="true">${content}</div>
                        `;
                        
                        canvas.appendChild(div);
                        makeDraggable(div);
                    }
            
                    // 2. ADD NEW PHOTO
                    function addPhoto(input) {
                        const file = input.files[0];
                        if (!file) return;
            
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            createPhotoElement(e.target.result);
                        };
                        reader.readAsDataURL(file);
                    }
            
                    function createPhotoElement(src, x = 100, y = 100, w = "200px") {
                        const div = document.createElement('div');
                        div.className = 'drag-item';
                        div.style.left = x + 'px';
                        div.style.top = y + 'px';
            
                        div.innerHTML = `
                            <div class="handle"><span>⠿ DRAG PHOTO</span> <span class="delete-btn" onclick="this.parentElement.parentElement.remove()">X</span></div>
                            <div class="image-wrapper" style="width: ${w}">
                                <img src="${src}">
                            </div>
                        `;
            
                        canvas.appendChild(div);
                        makeDraggable(div);
                    }
            
                    // 3. DRAG LOGIC (Works for any element passed to it)
                    function makeDraggable(el) {
                        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
                        const handle = el.querySelector('.handle');
            
                        handle.onmousedown = (e) => {
                            e.preventDefault();
                            pos3 = e.clientX;
                            pos4 = e.clientY;
                            document.onmouseup = () => {
                                document.onmouseup = null;
                                document.onmousemove = null;
                            };
                            document.onmousemove = (e) => {
                                e.preventDefault();
                                pos1 = pos3 - e.clientX;
                                pos2 = pos4 - e.clientY;
                                pos3 = e.clientX;
                                pos4 = e.clientY;
                                el.style.top = (el.offsetTop - pos2) + "px";
                                el.style.left = (el.offsetLeft - pos1) + "px";
                            };
                        };
                    }
            
                    // 4. SAVE & LOAD (Handles multiple items)
                    function saveAll() {
                        const items = [];
                        document.querySelectorAll('.drag-item').forEach(el => {
                            const isImg = el.querySelector('img');
                            items.push({
                                type: isImg ? 'image' : 'text',
                                content: isImg ? isImg.src : el.querySelector('.content-area').innerHTML,
                                x: el.offsetLeft,
                                y: el.offsetTop,
                                w: isImg ? el.querySelector('.image-wrapper').style.width : null
                            });
                        });
                        localStorage.setItem('scrapbookData', JSON.stringify(items));
                        alert("Layout Saved!");
                    }
            
                    window.onload = () => {
                        const data = JSON.parse(localStorage.getItem('scrapbookData'));
                        if (data) {
                            data.forEach(item => {
                                if (item.type === 'text') addText(item.content, item.x, item.y);
                                else createPhotoElement(item.content, item.x, item.y, item.w);
                            });
                        }
                    };
                </script>
            
                <button id="openLoginBtn" type="button" class="login-btn" onclick="openLoginModal()" style="display: block;">
                    Login
                </button>
                   <div class="login-box">
                        <div id="login-form-content">
                            <h3>Admin Login</h3>
                            <input type="text" id="username" placeholder="Username"><br>
                            <input type="password" id="password" placeholder="Password"><br>
                            <button type="button" onclick="checkLogin();">Login</button>
                            <button onclick="closeLogin()" style="background:#666;">Cancel</button>
                        </div>
                    
                        <button id="logoutBtn" type="button" onclick="logout()" style="display: none; background: #dc3545; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer;">
                            Logout
                        </button>
                    
                        <p id="loginError" style="color:red; font-size:12px; display:none;">Incorrect details!</p>
                    </div>
            
                <script>
                    // 1. THE AUTO-CHECK (Runs every time the page refreshes)
                    window.onload = function() {
                        var isLoggedIn = localStorage.getItem('adminLoggedIn');
                        if (isLoggedIn === 'true') {
                            console.log("Welcome back, Boss!");
                            applyAdminUI();
                        }
                    };
                
                    // 2. THE LOGIN ENGINE
                    function checkLogin() {
                        var u = document.getElementById('username').value;
                        var p = document.getElementById('password').value;
                        var loginBox = document.querySelector('.login-box');
                
                        // Visual feedback
                        if (loginBox) loginBox.style.background = 'yellow';
                
                        setTimeout(function() {
                            if (u === 'username' && p === 'password') {
                                // SAVE to browser memory
                                localStorage.setItem('adminLoggedIn', 'true');
                                applyAdminUI();
                                alert("Success! Welcome Boss.");
                            } else {
                                alert("Incorrect Credentials.");
                                if (loginBox) loginBox.style.background = 'white';
                            }
                        }, 400);
                    }
                
                    // 3. THE MASTER SWITCH (Shows everything for the Admin)
                    function applyAdminUI() {
                        // Hide the "Admin Login" button visitors see
                        var openBtn = document.getElementById('openLoginBtn');
                        if (openBtn) openBtn.style.setProperty('display', 'none', 'important');
                
                        // Hide the input fields/form
                        var form = document.getElementById('login-form-content');
                        if (form) form.style.setProperty('display', 'none', 'important');
                
                        // Show the Logout button and Username container
                        var adminTools = document.getElementById('admin-header-tools');
                        if (adminTools) adminTools.style.setProperty('display', 'block', 'important');
                
                        // Show the Modal/Box so the logout button is visible
                        var modal = document.getElementById('loginModal');
                        if (modal) modal.style.setProperty('display', 'block', 'important');
                
                        // WAKE UP all elements with class "admin-only" (Add Text/Photo buttons)
                        var admins = document.getElementsByClassName('admin-only');
                        for (var i = 0; i < admins.length; i++) {
                            admins[i].style.setProperty('display', 'inline-block', 'important');
                        }
                    }
                
                    // 4. THE LOGOUT (Clears memory and resets for visitors)
                    function logout() {
                        localStorage.removeItem('adminLoggedIn');
                        alert("Logged Out. See you later, Boss!");
                        location.reload(); 
                    }

                </script>
                   
    </body>
