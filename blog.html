            <div class="social_img">

            <div class="canvas">
                <p>Your blog content starts here.</p>
            </div>
            <div id="loginModal" class="login-overlay" style="display: none;">
                <div class="login-box">
                    <div id="login-form-content">
                        <h3>Admin Login</h3>
                        
                        <input type="text" id="admin-user-input" placeholder="Username">
                        
                        <input type="password" id="admin-pass-input" placeholder="Password">
                        
                        <div class="login-buttons">
                            <button onclick="checkLogin()">Login Now</button>
                            <button onclick="closeLogin()" class="cancel-btn">Cancel</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="admin-only admin-toolbar">
                <p>Admin Mode Active</p>
                <button onclick="logout()" class="logout-btn">Log Out</button>
            </div>
            <script>
            function openLogin() {
                const modal = document.getElementById('loginModal');
                if (modal) {
                    modal.style.display = 'block';
                } else {
                    console.error("Could not find the element with ID 'loginModal'");
                }
            }
            
            function closeLogin() {
                document.getElementById('loginModal').style.display = 'none';
            }
            
            function checkLogin() {
                const user = document.getElementById('admin-user-input').value;
                const pass = document.getElementById('admin-pass-input').value;
            
                if (user === 'username' && pass === 'password') {
                    document.body.classList.add('admin-mode');
                    closeLogin();
                    alert("Welcome back, Jonie!");
                } else {
                    alert("Access Denied");
                }
            }
                
                    function logout() {
                    document.body.classList.remove('admin-mode');
                    alert("Logged Out Successfully");
                }
            </script>
            <p id="UC">UNDER CONSTRUCTION</p>
            <footer style="text-align: center; padding: 20px; opacity: 0.5;">
            <p>© 2026 Joniel | <a href="javascript:void(0)" onclick="openLogin()" style="color: inherit; text-decoration: none;">Admin Access</a></p>
</footer>
