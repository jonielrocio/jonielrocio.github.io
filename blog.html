        <div class="main">    
            <div class="slides id="sblog">
                <input type="radio" name="images" id="i1" checked>
                <input type="radio" name="images" id="i2">
                <input type="radio" name="images" id="i3">
                <input type="radio" name="images" id="i4">
                
                <div class="slide_img" id="one">
                    <img src="photos/banner.jpg">
                        <label for="i4" class="pre"></label>
                        <label for="i2" class="nxt"></label>
                </div>
                 <div class="slide_img" id="two">
                    <img src="photos/Awesome.jpg">
                        <label for="i1" class="pre"></label>
                        <label for="i3" class="nxt"></label>
                </div>
                <div class="slide_img" id="three">
                    <img src="photos/Entrance.jpg">
                        <label for="i2" class="pre"></label>
                        <label for="i4" class="nxt"></label>
                </div>
                <div class="slide_img" id="four">
                    <img src="photos/Whitney%20Summit.jpg">
                        <label for="i3" class="pre"></label>
                        <label for="i1" class="nxt"></label>
                </div>
                
                <div class="nav_img">
                    <label class="dots" id="dot1" for="i1"></label>
                    <label class="dots" id="dot2" for="i2"></label>
                    <label class="dots" id="dot3" for="i3"></label>
                    <label class="dots" id="dot4" for="i4"></label>
                </div>

            <div class="social_img">
                <a href="#"><img class="simg" src="photos/Facebook.png"></a>
                <a href="#"><img class="simg" src="photos/Google+.png"></a>
                <a href="#"><img class="simg" src="photos/Instagram.png"></a>
                <a href="#"><img class="simg" src="photos/Twitter.png"></a>
                <a href="#"><img class="simg" src="photos/YouTube.png"></a>
            </div>
            <div class="canvas">
                <p>Your blog content starts here.</p>
            </div>
            <div id="login-overlay" class="login-overlay" style="display: none;">
                <div class="login-box">
                    <h3>Admin Access</h3>
                    <input type="password" id="adminPass" placeholder="Password">
            <        div class="login-buttons">
                        <button onclick="checkLogin()">Login</button>
                        <button onclick="closeLogin()" class="cancel-btn">Cancel</button>
                    </div>
                </div>
            </div>
            <div class="admin-only admin-toolbar">
                <p>Admin Mode Active</p>
                <button onclick="logout()" class="logout-btn">Log Out</button>
            </div>
            <script>
                function openLogin() {
                    document.getElementById('login-overlay').style.display = 'flex';
                }
        
                function closeLogin() {
                    document.getElementById('login-overlay').style.display = 'none';
                }
        
                function checkLogin() {
                    const pass = document.getElementById('adminPass').value;
                    // You can change 'admin123' to whatever you want
                    if (pass === 'admin123') {
                        document.body.classList.add('admin-mode');
                        closeLogin();
                        alert("Admin Mode Active!");
                    } else {
                        alert("Access Denied");
                    }
                }
                function logout() {
                    document.body.classList.remove('admin-mode');
                    alert("Logged Out Successfully");
                }
            </script>
            <p id="UC">UNDER CONSTRUCTION</p>
    </body>
</html>
