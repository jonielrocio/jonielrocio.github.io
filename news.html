  <script>
    let slideIndex = 1;
    
    setInterval(() => {
      // This finds ALL radio buttons inside your 'slides' container
      const totalSlides = document.querySelectorAll('.slides input[type="radio"]').length;
      
      if (totalSlides > 0) {
        let radio = document.getElementById('i' + slideIndex);
        if (radio) {
            radio.checked = true;
        }
        
        slideIndex++;
        
        // Instead of '4', it uses whatever the actual count is
        if (slideIndex > totalSlides) {
            slideIndex = 1;
        }
      }
    }, 5000);
  </script>
