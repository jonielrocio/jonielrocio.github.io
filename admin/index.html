<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <div id="loading-check" style="text-align: center; margin-top: 50px; font-family: sans-serif;">
    <h2>Checking Admin Connection...</h2>
    <p>If this stays here for more than 10 seconds, Netlify Identity is blocked.</p>
  </div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    // If the CMS loads, it will automatically clear the "Checking..." message
    window.addEventListener('DOMContentLoaded', () => {
        console.log("Admin Page Loaded");
    });
  </script>
</body>
</html>
